<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020711" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>蒸氣龐克空氣曲棍球 v1.1</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="score-board">
      <span id="ai-score">AI 0</span>
      <span id="player-score">YOU 0</span>
    </div>
    <div id="mini-stats">
      <span id="speed-label">0 km/h</span>
      <span id="combo-label">COMBO x0</span>
    </div>
    <button id="pause-btn" aria-label="暫停">Ⅱ</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <section id="menu" class="overlay active">
    <div class="panel">
      <p class="eyebrow">Steampunk v1.1 / Haptic Engine</p>
      <h1>蒸氣龐克曲棍球</h1>
      <p class="desc">手機直向操作，黃銅、齒輪、蒸氣煙霧與機械球桌風格。</p>

      <label>
        難度
        <select id="difficulty-select">
          <option value="easy">簡單</option>
          <option value="normal" selected>普通</option>
          <option value="hard">困難</option>
          <option value="boss">Boss</option>
        </select>
      </label>

      <label>
        視覺主題
        <select id="theme-select">
          <option value="steampunk" selected>Steampunk 黃銅蒸氣</option>
          <option value="copper">Copper 古銅工坊</option>
          <option value="royal">Royal Brass 皇家黃銅</option>
          <option value="coal">Coal Engine 煤炭機械</option>
        </select>
      </label>

      <div class="switches">
        <button id="sound-toggle" class="toggle active">音效 ON</button>
        <button id="vibration-toggle" class="toggle active">震動 ON</button>
      </div>

      <div class="record">
        最高勝場：<span id="best-win">0</span>
      </div>

      <button id="start-button" class="primary">開始遊戲</button>
    </div>
  </section>

  <section id="countdown" class="overlay transparent">
    <div id="countdown-text">3</div>
  </section>

  <section id="pause" class="overlay">
    <div class="panel">
      <h2>暫停中</h2>
      <button id="resume-button" class="primary">繼續</button>
      <button id="back-menu-button">回首頁</button>
    </div>
  </section>

  <section id="game-over" class="overlay">
    <div class="panel">
      <p class="eyebrow">Result</p>
      <h2 id="winner-text">遊戲結束</h2>
      <p id="final-score"></p>
      <button id="restart-button" class="primary">再玩一次</button>
      <button id="home-button">回首頁</button>
    </div>
  </section>

  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(() => {}));
    }
  </script>
</body>
</html>
