name: Validate multiplayer engine

on:
  push:
    branches: [main]
    paths:
      - 'multiplayer-v408.js'
      - 'multiplayer-v430-loader.js'
      - 'scripts/validate-v430.mjs'
      - '.github/workflows/validate-multiplayer.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check loader syntax
        run: node --check multiplayer-v430-loader.js

      - name: Apply and validate all runtime patches
        run: node scripts/validate-v430.mjs
