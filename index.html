<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Neon Air Hockey｜空氣曲棍球</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app-shell">
    <section class="game-panel" aria-label="空氣曲棍球遊戲">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Neon Arcade</p>
          <h1>空氣曲棍球</h1>
        </div>

        <div class="scoreboard" aria-label="比分">
          <div class="score-cell player">
            <span>玩家</span>
            <strong id="playerScore">0</strong>
          </div>
          <div class="score-cell ai">
            <span>AI</span>
            <strong id="aiScore">0</strong>
          </div>
        </div>
      </header>

      <div class="rink-wrap">
        <canvas
          id="gameCanvas"
          width="900"
          height="1200"
          aria-label="霓虹空氣曲棍球球桌"
        ></canvas>

        <div id="roundBanner" class="round-banner show">
          拖曳藍色球拍開始
        </div>
      </div>

      <div id="status" class="status-strip" aria-live="polite">
        拖曳藍色球拍或按「開始」發球
      </div>

      <footer class="controls">
        <button id="startButton" type="button">開始</button>
        <button id="resetButton" type="button">重設</button>
        <button id="fullscreenButton" type="button">全螢幕</button>

        <label class="toggle">
          <input id="soundToggle" type="checkbox" checked />
          <span>音效</span>
        </label>

        <label class="target-label">
          <span>目標</span>
          <input id="targetScore" type="number" min="1" max="20" step="1" value="7" inputmode="numeric" />
        </label>

        <div class="difficulty-group" aria-label="難度">
          <button class="difficulty-btn" type="button" data-difficulty="easy">輕鬆</button>
          <button class="difficulty-btn active" type="button" data-difficulty="normal">標準</button>
          <button class="difficulty-btn" type="button" data-difficulty="hard">高手</button>
        </div>

        <label class="select-label legacy-difficulty">
          <span>難度</span>
          <select id="difficultySelect">
            <option value="easy">輕鬆</option>
            <option value="normal" selected>標準</option>
            <option value="hard">高手</option>
          </select>
        </label>
      </footer>
    </section>

    <aside class="info-panel" aria-label="遊戲狀態">
      <div class="hero-card">
        <div class="orb orb-cyan"></div>
        <div class="orb orb-red"></div>
        <div class="hero-title">
          <span>V3 豪華版</span>
          <strong>NEON AIR HOCKEY</strong>
        </div>
      </div>

      <div class="stat-grid">
        <div>
          <span>目標分數</span>
          <strong id="targetScoreReadout">7</strong>
        </div>
        <div>
          <span>最高連擊</span>
          <strong id="bestRally">0</strong>
        </div>
        <div>
          <span>目前連擊</span>
          <strong id="rallyCount">0</strong>
        </div>
        <div>
          <span>球速</span>
          <strong id="speedReadout">0</strong>
        </div>
        <div>
          <span>FPS</span>
          <strong id="fpsReadout">0</strong>
        </div>
        <div>
          <span>狀態</span>
          <strong id="statusReadout">待機</strong>
        </div>
      </div>

      <p class="hint">
        操作方式：滑鼠或手指拖曳藍色球拍。先得到 7 分者獲勝。
      </p>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
