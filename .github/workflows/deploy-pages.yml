name: Deploy Bubble Island Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pages-deploy-status.json'
      - '.github/workflows/validate-multiplayer.yml'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  statuses: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build verified static artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: configure
        uses: actions/configure-pages@v6

      - name: Prepare static site
        id: prepare
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'node_modules/' \
            --exclude 'tests/' \
            --exclude 'scripts/' \
            --exclude 'test-results/' \
            --exclude 'playwright-report/' \
            --exclude 'package-lock.json' \
            --exclude 'package.json'

          grep -Fq '<title>泡泡島空氣曲棍球 v5.0.0</title>' _site/index.html
          grep -Fq 'multiplayer-v500.js?v=5.0.0' _site/index.html
          test -f _site/.nojekyll
          test -f _site/multiplayer-v500.js
          test -f _site/multiplayer-v500-ui.js
          test -f _site/multiplayer-v500.css
          test "$(find _site -maxdepth 1 -name 'multiplayer-v500-payload-*.js' | wc -l)" -eq 7
          test -f _site/realtime-hello-throttle-v404.js
          test -f _site/multiplayer-test-hooks-v434.js

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

      - name: Publish build status
        if: always()
        env:
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          state=success
          description='Pages artifact built successfully'
          if [ "$CONFIGURE_OUTCOME" != success ] || [ "$PREPARE_OUTCOME" != success ] || [ "$UPLOAD_OUTCOME" != success ]; then
            state=failure
            description="Build failed: configure=$CONFIGURE_OUTCOME prepare=$PREPARE_OUTCOME upload=$UPLOAD_OUTCOME"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$(jq -n --arg state "$state" --arg description "$description" --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" '{state:$state,context:"pages-build",description:$description,target_url:$target_url}')"

  deploy:
    name: Deploy verified artifact
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish deployment status
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          state=success
          description='Bubble Island v5.0 deployed to GitHub Pages'
          if [ "$DEPLOY_OUTCOME" != success ]; then
            state=failure
            description="Pages deploy failed: $DEPLOY_OUTCOME"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$(jq -n --arg state "$state" --arg description "$description" --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" '{state:$state,context:"pages-deploy",description:$description,target_url:$target_url}')"
