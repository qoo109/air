<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Air Hockey</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #1b2cff55, transparent 35%),
        radial-gradient(circle at bottom, #ff00d455, transparent 35%),
        #050814;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 14px;
      gap: 10px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 46px);
      color: #7df9ff;
      text-shadow: 0 0 10px #00eaff, 0 0 28px #008cff;
      letter-spacing: 2px;
    }

    .score {
      display: flex;
      gap: 16px;
      font-size: clamp(18px, 4vw, 34px);
      font-weight: 800;
    }

    .score span {
      padding: 8px 14px;
      border: 1px solid #ffffff33;
      border-radius: 16px;
      background: #ffffff10;
      box-shadow: 0 0 20px #00f7ff33;
    }

    .arena-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    canvas {
      width: min(96vw, 760px);
      height: min(68vh, 920px);
      max-height: 100%;
      border-radius: 26px;
      border: 2px solid #73f7ff;
      background: #070b1d;
      box-shadow:
        0 0 18px #00eaff,
        inset 0 0 34px #00eaff55,
        0 0 80px #ff00ff33;
    }

    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 22px;
      border-radius: 18px;
      background: #00000088;
      border: 1px solid #ffffff33;
      backdrop-filter: blur(10px);
      font-weight: 800;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 10px #00eaff;
      pointer-events: none;
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      align-items: center;
    }

    button, select, input {
      border: 1px solid #7df9ff77;
      background: #07122d;
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 0 14px #00eaff33;
      outline: none;
    }

    button {
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #10346f;
      box-shadow: 0 0 22px #00eaff88;
    }

    .stats {
      color: #c7faff;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .app { padding: 8px; }
      header { flex-direction: column; }
      footer { font-size: 12px; }
      button, select, input { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>NEON AIR HOCKEY</h1>
      <div class="score">
        <span>玩家 <b id="playerScore">0</b></span>
        <span>AI <b id="aiScore">0</b></span>
      </div>
    </header>

    <section class="arena-wrap">
      <canvas id="game"></canvas>
      <div class="message" id="message">拖曳藍色球拍開始</div>
    </section>

    <footer>
      <button id="startBtn">開始</button>
      <button id="resetBtn">重設</button>
      <button id="soundBtn">音效：開</button>

      <select id="difficulty">
        <option value="easy">輕鬆</option>
        <option value="normal" selected>標準</option>
        <option value="hard">高手</option>
      </select>

      <label>
        目標分數
        <input id="targetScore" type="number" min="3" max="15" value="7" style="width:70px">
      </label>

      <div class="stats">
        目前連擊 <b id="combo">0</b> /
        最高連擊 <b id="bestCombo">0</b> /
        球速 <b id="speed">0</b>
      </div>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const playerScoreEl = document.getElementById("playerScore");
    const aiScoreEl = document.getElementById("aiScore");
    const messageEl = document.getElementById("message");
    const comboEl = document.getElementById("combo");
    const bestComboEl = document.getElementById("bestCombo");
    const speedEl = document.getElementById("speed");

    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const soundBtn = document.getElementById("soundBtn");
    const difficultyEl = document.getElementById("difficulty");
    const targetScoreEl = document.getElementById("targetScore");

    const state = {
      running: false,
      sound: true,
      playerScore: 0,
      aiScore: 0,
      combo: 0,
      bestCombo: 0,
      particles: [],
      shake: 0
    };

    const puck = { x: 0, y: 0, r: 13, vx: 0, vy: 0 };
    const player = { x: 0, y: 0, r: 32, color: "#35a7ff" };
    const ai = { x: 0, y: 0, r: 32, color: "#ff3df2" };

    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * devicePixelRatio);
      canvas.height = Math.floor(rect.height * devicePixelRatio);
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

      const w = rect.width;
      const h = rect.height;

      player.x = w / 2;
      player.y = h * 0.78;
      ai.x = w / 2;
      ai.y = h * 0.22;

      resetPuck();
    }

    function W() { return canvas.getBoundingClientRect().width; }
    function H() { return canvas.getBoundingClientRect().height; }

    function resetPuck(direction = Math.random() > 0.5 ? 1 : -1) {
      puck.x = W() / 2;
      puck.y = H() / 2;
      puck.vx = (Math.random() * 3 + 2) * (Math.random() > 0.5 ? 1 : -1);
      puck.vy = direction * (Math.random() * 3 + 4);
      state.combo = 0;
    }

    function beep(freq = 440, duration = 0.05) {
      if (!state.sound) return;
      const audio = new AudioContext();
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(audio.destination);
      gain.gain.value = 0.05;
      osc.start();
      osc.stop(audio.currentTime + duration);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function collide(mallet) {
      const dx = puck.x - mallet.x;
      const dy = puck.y - mallet.y;
      const dist = Math.hypot(dx, dy);
      const minDist = puck.r + mallet.r;

      if (dist < minDist) {
        const nx = dx / dist;
        const ny = dy / dist;
        puck.x = mallet.x + nx * minDist;
        puck.y = mallet.y + ny * minDist;

        const speed = Math.min(13, Math.hypot(puck.vx, puck.vy) + 0.45);
        puck.vx = nx * speed + (Math.random() - 0.5) * 1.2;
        puck.vy = ny * speed;

        state.combo++;
        state.bestCombo = Math.max(state.bestCombo, state.combo);
        state.shake = 6;
        spawnParticles(puck.x, puck.y, mallet.color);
        beep(280 + speed * 40, 0.035);
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 14; i++) {
        state.particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 28,
          color
        });
      }
    }

    function updateAI() {
      const diff = difficultyEl.value;
      const speedMap = { easy: 3.2, normal: 5.2, hard: 7.2 };
      const errorMap = { easy: 55, normal: 28, hard: 10 };

      let targetX = puck.x + (Math.random() - 0.5) * errorMap[diff];

      if (puck.y > H() / 2 && diff !== "hard") {
        targetX = W() / 2;
      }

      ai.x += clamp(targetX - ai.x, -speedMap[diff], speedMap[diff]);
      ai.y = H() * 0.22 + Math.sin(Date.now() / 240) * 12;

      ai.x = clamp(ai.x, ai.r, W() - ai.r);
      ai.y = clamp(ai.y, ai.r, H() / 2 - ai.r);
    }

    function update() {
      if (!state.running) return;

      updateAI();

      puck.x += puck.vx;
      puck.y += puck.vy;

      if (puck.x - puck.r < 0 || puck.x + puck.r > W()) {
        puck.vx *= -1;
        puck.x = clamp(puck.x, puck.r, W() - puck.r);
        beep(180, 0.03);
      }

      collide(player);
      collide(ai);

      if (puck.y < -puck.r) {
        state.playerScore++;
        goal("玩家得分！");
        resetPuck(1);
      }

      if (puck.y > H() + puck.r) {
        state.aiScore++;
        goal("AI 得分！");
        resetPuck(-1);
      }

      state.particles = state.particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
        return p.life > 0;
      });

      state.shake *= 0.85;

      const target = Number(targetScoreEl.value);
      if (state.playerScore >= target || state.aiScore >= target) {
        state.running = false;
        messageEl.style.display = "block";
        messageEl.textContent = state.playerScore > state.aiScore ? "你贏了！🏆" : "AI 獲勝！";
        beep(700, 0.15);
      }
    }

    function goal(text) {
      messageEl.style.display = "block";
      messageEl.textContent = text;
      setTimeout(() => {
        if (state.running) messageEl.style.display = "none";
      }, 650);
      state.combo = 0;
      state.shake = 14;
      beep(120, 0.12);
    }

    function drawCircle(x, y, r, color) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 22;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#ffffffaa";
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function draw() {
      ctx.save();

      const sx = (Math.random() - 0.5) * state.shake;
      const sy = (Math.random() - 0.5) * state.shake;
      ctx.translate(sx, sy);

      ctx.clearRect(-20, -20, W() + 40, H() + 40);

      ctx.strokeStyle = "#7df9ff88";
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 14]);
      ctx.beginPath();
      ctx.moveTo(0, H() / 2);
      ctx.lineTo(W(), H() / 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.arc(W() / 2, H() / 2, 70, 0, Math.PI * 2);
      ctx.strokeStyle = "#ff3df288";
      ctx.stroke();

      drawCircle(ai.x, ai.y, ai.r, ai.color);
      drawCircle(player.x, player.y, player.r, player.color);
      drawCircle(puck.x, puck.y, puck.r, "#ffffff");

      for (const p of state.particles) {
        ctx.globalAlpha = p.life / 28;
        drawCircle(p.x, p.y, 3, p.color);
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      playerScoreEl.textContent = state.playerScore;
      aiScoreEl.textContent = state.aiScore;
      comboEl.textContent = state.combo;
      bestComboEl.textContent = state.bestCombo;
      speedEl.textContent = Math.round(Math.hypot(puck.vx, puck.vy) * 10);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function startGame() {
      state.running = true;
      messageEl.style.display = "none";
    }

    function resetGame() {
      state.running = false;
      state.playerScore = 0;
      state.aiScore = 0;
      state.combo = 0;
      state.bestCombo = 0;
      state.particles = [];
      messageEl.style.display = "block";
      messageEl.textContent = "拖曳藍色球拍開始";
      resetPuck();
    }

    function movePlayer(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      player.x = clamp(clientX - rect.left, player.r, W() - player.r);
      player.y = clamp(clientY - rect.top, H() / 2 + player.r, H() - player.r);
      if (!state.running) startGame();
    }

    canvas.addEventListener("pointermove", e => movePlayer(e.clientX, e.clientY));
    canvas.addEventListener("pointerdown", e => {
      canvas.setPointerCapture(e.pointerId);
      movePlayer(e.clientX, e.clientY);
    });

    startBtn.onclick = startGame;
    resetBtn.onclick = resetGame;
    soundBtn.onclick = () => {
      state.sound = !state.sound;
      soundBtn.textContent = `音效：${state.sound ? "開" : "關"}`;
    };

    window.addEventListener("resize", resize);

    resize();
    resetGame();
    loop();
  </script>
</body>
</html>
