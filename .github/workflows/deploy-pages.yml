name: Deploy Bubble Island Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/validate-multiplayer.yml'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build verified static artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'node_modules/' \
            --exclude 'tests/' \
            --exclude 'scripts/' \
            --exclude 'test-results/' \
            --exclude 'playwright-report/' \
            --exclude 'package-lock.json' \
            --exclude 'package.json'

          grep -Fq '<title>泡泡島空氣曲棍球 v4.3.5</title>' _site/index.html
          test -f _site/.nojekyll
          test -f _site/multiplayer-v435-loader.js
          test -f _site/realtime-hello-throttle-v404.js
          test -f _site/multiplayer-test-hooks-v434.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy verified artifact
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
