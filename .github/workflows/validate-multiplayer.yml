name: Validate multiplayer engine

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'package.json'
      - 'realtime-hello-throttle-v404.js'
      - 'multiplayer-v408.js'
      - 'multiplayer-v430-loader.js'
      - 'multiplayer-v431-loader.js'
      - 'multiplayer-v432-loader.js'
      - 'multiplayer-v433-loader.js'
      - 'multiplayer-v435-loader.js'
      - 'multiplayer-v500*.js'
      - 'multiplayer-v500.css'
      - 'multiplayer-test-hooks-v434.js'
      - 'scripts/validate-v430.mjs'
      - 'scripts/run-puck-sync-matrix.mjs'
      - 'scripts/run-e2e-route-gate.mjs'
      - 'scripts/verify-e2e-report.mjs'
      - 'tests/e2e/multiplayer-drift.spec.mjs'
      - 'tests/e2e/multiplayer-realtime-fallback.spec.mjs'
      - 'playwright.config.mjs'
      - '.github/workflows/validate-multiplayer.yml'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'package.json'
      - 'realtime-hello-throttle-v404.js'
      - 'multiplayer-v408.js'
      - 'multiplayer-v430-loader.js'
      - 'multiplayer-v431-loader.js'
      - 'multiplayer-v432-loader.js'
      - 'multiplayer-v433-loader.js'
      - 'multiplayer-v435-loader.js'
      - 'multiplayer-v500*.js'
      - 'multiplayer-v500.css'
      - 'multiplayer-test-hooks-v434.js'
      - 'scripts/validate-v430.mjs'
      - 'scripts/run-puck-sync-matrix.mjs'
      - 'scripts/run-e2e-route-gate.mjs'
      - 'scripts/verify-e2e-report.mjs'
      - 'tests/e2e/multiplayer-drift.spec.mjs'
      - 'tests/e2e/multiplayer-realtime-fallback.spec.mjs'
      - 'playwright.config.mjs'
      - '.github/workflows/validate-multiplayer.yml'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Check JavaScript syntax
        run: |
          node --check realtime-hello-throttle-v404.js
          node --check multiplayer-v430-loader.js
          node --check multiplayer-v431-loader.js
          node --check multiplayer-v432-loader.js
          node --check multiplayer-v433-loader.js
          node --check multiplayer-v435-loader.js
          node --check multiplayer-v500.js
          node --check multiplayer-v500-ui.js
          for payload in multiplayer-v500-payload-*.js; do node --check "$payload"; done
          node --check multiplayer-test-hooks-v434.js
          node --check scripts/run-puck-sync-matrix.mjs
          node --check scripts/run-e2e-route-gate.mjs
          node --check scripts/verify-e2e-report.mjs
          node --check tests/e2e/multiplayer-drift.spec.mjs
          node --check tests/e2e/multiplayer-realtime-fallback.spec.mjs
          node --check playwright.config.mjs

      - name: Verify v5.0 compiled runtime payload
        run: |
          cat multiplayer-v500-payload-*.js \
            | sed -E "s/^.*\\+'//; s/';$//" \
            | tr -d '\n' \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/multiplayer-v500-runtime.js
          node --check /tmp/multiplayer-v500-runtime.js
          grep -Fq "version: '5.0.0'" /tmp/multiplayer-v500-runtime.js
          grep -Fq 'startRoom' /tmp/multiplayer-v500-runtime.js
          grep -Fq 'disconnectFallbackTimer = setTimeout' /tmp/multiplayer-v500-runtime.js

      - name: Apply and validate all runtime patches
        run: node scripts/validate-v430.mjs

      - name: Run deterministic puck synchronization matrix
        run: node scripts/run-puck-sync-matrix.mjs

      - name: Upload synchronization matrix
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: puck-sync-matrix-${{ github.run_number }}
          path: test-results/puck-sync-matrix.json
          if-no-files-found: warn
          retention-days: 14
