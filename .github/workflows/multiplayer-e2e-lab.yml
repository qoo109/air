name: Multiplayer E2E Lab

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'package.json'
      - 'playwright.config.mjs'
      - 'realtime-hello-throttle-v404.js'
      - 'multiplayer-v435-loader.js'
      - 'multiplayer-v500*.js'
      - 'multiplayer-v500.css'
      - 'multiplayer-test-hooks-v434.js'
      - 'scripts/run-e2e-route-gate.mjs'
      - 'scripts/verify-e2e-report.mjs'
      - 'tests/e2e/**'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'package.json'
      - 'playwright.config.mjs'
      - 'realtime-hello-throttle-v404.js'
      - 'multiplayer-v435-loader.js'
      - 'multiplayer-v500*.js'
      - 'multiplayer-v500.css'
      - 'multiplayer-test-hooks-v434.js'
      - 'scripts/run-e2e-route-gate.mjs'
      - 'scripts/verify-e2e-report.mjs'
      - 'tests/e2e/**'
      - '.github/workflows/multiplayer-e2e-lab.yml'
  workflow_dispatch:
    inputs:
      delay_ms:
        description: Artificial one-way gameplay delay in milliseconds
        required: true
        default: '60'
        type: string
      jitter_ms:
        description: Artificial gameplay jitter in milliseconds
        required: true
        default: '20'
        type: string
      loss_pct:
        description: Artificial gameplay packet loss percentage
        required: true
        default: '2'
        type: string
      sample_duration_ms:
        description: Measurement duration in milliseconds
        required: true
        default: '15000'
        type: string

permissions:
  contents: read

concurrency:
  group: multiplayer-e2e-lab-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  two-player-lab:
    name: two-player-lab (${{ matrix.route }})
    runs-on: ubuntu-latest
    timeout-minutes: 22
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        route: [p2p, turn, realtime]
    env:
      NET_DELAY: ${{ inputs.delay_ms || '60' }}
      NET_JITTER: ${{ inputs.jitter_ms || '20' }}
      NET_LOSS: ${{ inputs.loss_pct || '2' }}
      FORCE_TURN: ${{ matrix.route == 'turn' }}
      FORCE_REALTIME: ${{ matrix.route == 'realtime' }}
      EXPECT_ROUTE: ${{ matrix.route == 'turn' && 'METERED' || matrix.route == 'realtime' && 'REALTIME' || 'P2P' }}
      SAMPLE_DURATION_MS: ${{ inputs.sample_duration_ms || '15000' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deterministic synchronization matrix
        run: npm run test:sync

      - name: Run two-player browser laboratory
        id: browser_lab
        continue-on-error: true
        run: |
          if [ "$FORCE_REALTIME" = "true" ]; then
            npx playwright test tests/e2e/multiplayer-realtime-fallback.spec.mjs
          else
            npx playwright test tests/e2e/multiplayer-drift.spec.mjs
          fi

      - name: Verify actual route and interpolated active-play drift
        id: route_gate
        if: always()
        continue-on-error: true
        run: node scripts/verify-e2e-report.mjs

      - name: Upload reports, traces and videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multiplayer-e2e-${{ matrix.route }}-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Write test summary
        if: always()
        run: |
          {
            echo '## 泡泡島雙玩家測試 v5.0 Stable'
            echo ''
            echo "- 驗證路徑：${EXPECT_ROUTE}"
            echo "- 延遲：${NET_DELAY}ms"
            echo "- 抖動：${NET_JITTER}ms"
            echo "- 丟包：${NET_LOSS}%"
            echo "- 強制 TURN：${FORCE_TURN}"
            echo "- 強制 Realtime 備援：${FORCE_REALTIME}"
            echo "- 量測時間：${SAMPLE_DURATION_MS}ms"
            echo "- 原始瀏覽器測試：${{ steps.browser_lab.outcome }}"
            echo "- 路由與 active-play gate：${{ steps.route_gate.outcome }}"
            echo ''
            echo 'P2P 要求 route=P2P；TURN 要求 route=METERED、relayOnlyAttempt=true；Realtime 要求 transport=relay 且 WebRTC 未連線。'
            echo 'P2P／TURN 使用 25/50/90；Realtime 備援使用 45/90/160 降階門檻，並確認實際 relay-game 流量。'
            echo 'v5.0 同時驗證壓縮 Runtime 啟動、較高同步頻率與 0.9 秒斷線備援。'
            echo '失敗時請下載對應 route artifact，查看 route-gate、failure-diagnostics、Trace、截圖與影片。'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when route or active-play gate failed
        if: steps.route_gate.outcome != 'success'
        run: |
          echo "${EXPECT_ROUTE} 路由或 active-play 漂移驗證失敗；完整狀態已上傳到 artifact。"
          exit 1
